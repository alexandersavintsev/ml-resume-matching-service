services:

  app:
    build:
      context: ./app
    env_file:
      - ./app/.env
    volumes:
      - ./app/src:/app/src
    depends_on:
      - database
      - rabbitmq
    networks:
      - backend
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  web-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    restart: on-failure
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq
    networks:
      - backend
    environment:
      RABBITMQ_DEFAULT_USER: ml_rabbit
      RABBITMQ_DEFAULT_PASS: ml_rabbit_pass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ml_service}
      POSTGRES_USER: ${POSTGRES_USER:-ml_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ml_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    networks:
      - backend

  publisher:
    build:
      context: ./app
    env_file:
      - ./app/.env
    volumes:
      - ./app/src:/app/src
    depends_on:
      - database
      - rabbitmq
    networks:
      - backend
    ports:
      - "8001:8000"
    command: ["uvicorn", "mq.publisher_api:app", "--host", "0.0.0.0", "--port", "8000"]

  worker-1:
    build:
      context: ./app
      dockerfile: Dockerfile.worker
    env_file:
      - ./app/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_started
    restart: on-failure
    networks:
      - backend
    command: ["python", "-m", "mq.worker", "--worker-id", "worker-1"]

  worker-2:
    build:
      context: ./app
      dockerfile: Dockerfile.worker
    env_file:
      - ./app/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_started
    restart: on-failure
    networks:
      - backend
    command: ["python", "-m", "mq.worker", "--worker-id", "worker-2"]

networks:
  backend:
    driver: bridge

volumes:
  postgres_volume:
  rabbitmq_volume:

