<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ML Resume Matching{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="/static/styles.css" rel="stylesheet">
</head>
<body data-page="{% block page %}{% endblock %}">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">ML Service</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="/cabinet">Кабинет</a></li>
        <li class="nav-item"><a class="nav-link" href="/predict-ui">ML-запрос</a></li>
        <li class="nav-item"><a class="nav-link" href="/history-ui">История</a></li>
      </ul>

      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/register">Регистрация</a></li>
        <li class="nav-item"><a class="nav-link" href="/login">Вход</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Выход</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div id="globalAlert"></div>
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
