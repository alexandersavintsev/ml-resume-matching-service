{% extends "base.html" %}
{% block title %}История — ML Service{% endblock %}

{% block content %}
<div id="historyRoot" class="row g-4">
  <div class="col-12">
    <div class="cardx">
      <div class="cardx-body">
        <div class="kicker mb-2"><i class="bi bi-clock-history"></i><span>Audit</span></div>
        <h3 class="fw-bold mb-1">История операций и предсказаний</h3>
        <div class="text-muted">Транзакции и запросы берём из backend через API.</div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="cardx">
      <div class="cardx-body">
        <div class="fw-semibold mb-2">Transactions</div>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Тип</th>
                <th>Amount</th>
                <th>Task</th>
              </tr>
            </thead>
            <tbody id="txTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="cardx">
      <div class="cardx-body">
        <div class="fw-semibold mb-2">Predictions</div>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Task</th>
                <th>Charged</th>
                <th>Status</th>
                <th>Invalid</th>
              </tr>
            </thead>
            <tbody id="predTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
