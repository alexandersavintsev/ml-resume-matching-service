{% extends "base.html" %}
{% block title %}Вход — ML Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="cardx">
      <div class="cardx-body">
        <div class="kicker mb-3"><i class="bi bi-lock"></i><span>Authentication</span></div>
        <h3 class="mb-2 fw-bold">Вход</h3>
        <p class="text-muted mb-4">Введи email — токен будет сохранён локально в браузере.</p>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label text-muted">Email</label>
            <input id="loginEmail" class="form-control" type="email" required />
          </div>

          <button class="btn btn-primary w-100" type="submit">
            <i class="bi bi-box-arrow-in-right me-1"></i> Войти
          </button>
        </form>

        <div class="hr-soft"></div>
        <div class="small text-muted">
          Нет аккаунта? <a href="/register">Регистрация</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
